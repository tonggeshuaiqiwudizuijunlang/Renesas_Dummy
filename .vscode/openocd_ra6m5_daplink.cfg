# DAPLink v2 / CMSIS-DAP 配置，用于 OpenOCD 连接 Renesas RA6M5 Cortex-M33。
# 这个配置用于“不复位、不下载”的 attach：适合程序已经由 Keil Assistant 下载并正在运行时，
# 在 VSCode 里连接上去看变量/Live Watch。

adapter driver cmsis-dap
transport select swd

# DAPLink/CMSIS-DAP 在部分板子上 1MHz 可能读不到 DP IDR，先用低速保证能连上。
adapter speed 100

set CHIPNAME r7fa6m5bh
set CPUTAPID 0x6ba02477

source [find target/swj-dp.tcl]
swj_newdap $CHIPNAME cpu -irlen 4 -expected-id $CPUTAPID

dap create $CHIPNAME.dap -chain-position $CHIPNAME.cpu
set _TARGETNAME $CHIPNAME.cpu
target create $_TARGETNAME cortex_m -dap $CHIPNAME.dap

reset_config none
